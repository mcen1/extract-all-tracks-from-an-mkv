name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --add-binary="ffmpeg.exe:." --add-binary="ffprobe.exe:." extract_audio.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extract-audio-exe
          path: dist/extract_audio.exe
